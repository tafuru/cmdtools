name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck install.sh

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        install-method: [clone, curl]

    steps:
      - uses: actions/checkout@v4
        if: matrix.install-method == 'clone'

      - name: Run install.sh (clone mode)
        if: matrix.install-method == 'clone'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 60
          max_attempts: 5
          command: bash install.sh

      - name: Run install.sh (curl mode)
        if: matrix.install-method == 'curl'
        uses: nick-fields/retry@v3
        env:
          CMDTOOLS_BRANCH: ${{ github.head_ref || github.ref_name }}
        with:
          timeout_minutes: 60
          max_attempts: 5
          command: |
            BRANCH="${{ github.head_ref || github.ref_name }}"
            bash -c "$(curl -fsSL https://raw.githubusercontent.com/tafuru/cmdtools/${BRANCH}/install.sh)"

      - name: Add Linuxbrew to PATH
        if: runner.os == 'Linux'
        run: |
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Prepare package manifests
        run: |
          manifest_dir="$RUNNER_TEMP/cmdtools-manifests"
          rm -rf "$manifest_dir"
          mkdir -p "$manifest_dir/platform/common"

          if [ "${{ matrix.install-method }}" = "clone" ]; then
            cp "$GITHUB_WORKSPACE/platform/common/Brewfile" "$manifest_dir/platform/common/Brewfile"

            if [ -f "$GITHUB_WORKSPACE/platform/linux/packages.txt" ]; then
              mkdir -p "$manifest_dir/platform/linux"
              cp "$GITHUB_WORKSPACE/platform/linux/packages.txt" "$manifest_dir/platform/linux/packages.txt"
            fi

            if [ -f "$GITHUB_WORKSPACE/platform/macos/Brewfile" ]; then
              mkdir -p "$manifest_dir/platform/macos"
              cp "$GITHUB_WORKSPACE/platform/macos/Brewfile" "$manifest_dir/platform/macos/Brewfile"
            fi
          else
            BRANCH="${{ github.head_ref || github.ref_name }}"
            BASE="https://raw.githubusercontent.com/tafuru/cmdtools/${BRANCH}"

            curl -fsSL "$BASE/platform/common/Brewfile" -o "$manifest_dir/platform/common/Brewfile"

            if [ "$RUNNER_OS" = "Linux" ]; then
              mkdir -p "$manifest_dir/platform/linux"
              curl -fsSL "$BASE/platform/linux/packages.txt" -o "$manifest_dir/platform/linux/packages.txt"
            fi

            if [ "$RUNNER_OS" = "macOS" ]; then
              mkdir -p "$manifest_dir/platform/macos"
              curl -fsSL "$BASE/platform/macos/Brewfile" -o "$manifest_dir/platform/macos/Brewfile"
            fi
          fi

          echo "CMDTOOLS_MANIFEST_DIR=$manifest_dir" >> "$GITHUB_ENV"

      - name: Verify apt packages
        if: runner.os == 'Linux'
        run: |
          while IFS= read -r pkg; do
            [[ -z "$pkg" || "$pkg" == \#* ]] && continue
            dpkg -s "$pkg" >/dev/null 2>&1 || {
              echo "Missing apt package: $pkg"
              exit 1
            }
          done < "$CMDTOOLS_MANIFEST_DIR/platform/linux/packages.txt"

      - name: Verify brew packages
        run: |
          brew bundle check --file "$CMDTOOLS_MANIFEST_DIR/platform/common/Brewfile"
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew bundle check --file "$CMDTOOLS_MANIFEST_DIR/platform/macos/Brewfile"
          fi

      - name: Test idempotency (re-run install.sh)
        if: matrix.install-method == 'clone'
        run: bash install.sh

  notify-dev-setup:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dev-setup CI
        run: |
          curl -fsSL -X POST \
            -H "Authorization: token ${{ secrets.DEV_SETUP_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/tafuru/dev-setup/dispatches \
            -d '{"event_type":"upstream-changed","client_payload":{"source":"cmdtools"}}'
